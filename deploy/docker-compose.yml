version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: iiko
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: uvicorn app.entrypoints.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      - redis
      - postgres
    ports:
      - "8000:8000"

  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: python -m app.entrypoints.worker
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      - redis
      - postgres

  bot:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: python -m app.entrypoints.bot
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      - backend

volumes:
  pg_data:
